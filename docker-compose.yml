services:
  db:
    image: postgres:18-alpine
    restart: always
    shm_size: 256mb
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-lazyit}
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      # Loopback only — the dev DB must not be reachable from the LAN (SEC-005, ADR-0028).
      # localhost connections are unaffected; production never publishes this port at all
      # (see infra/docker-compose.prod.yml).
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d lazyit -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  meilisearch:
    image: getmeili/meilisearch:v1.12.3
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    ports:
      # Loopback only — the dev search engine must not be reachable from the LAN (SEC-005, ADR-0028).
      # Production runs Meilisearch in infra/docker-compose.prod.yml (DevOps), never published.
      - "127.0.0.1:7700:7700"

  # --- Zitadel's own PostgreSQL — separate from the app DB (ADR-0037) -------------------
  # Hard requirement: Zitadel does aggressive schema migrations. Clean separation means
  # independent backups and a clean removal path when a customer brings their own IdP.
  # No published port — Zitadel connects to this within the Docker Compose default network.
  zitadel_db:
    image: postgres:18-alpine
    restart: always
    shm_size: 64mb
    environment:
      POSTGRES_USER: ${ZITADEL_DB_USER:-zitadel}
      POSTGRES_PASSWORD: ${ZITADEL_DB_PASSWORD}
      POSTGRES_DB: ${ZITADEL_DB_NAME:-zitadel}
    volumes:
      - zitadel_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ZITADEL_DB_USER:-zitadel} -d ${ZITADEL_DB_NAME:-zitadel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --- Zitadel IdP (dev) — loopback :8080, no TLS (Caddy terminates in prod) -----------
  # Admin console: http://localhost:8080/ui/console
  # OIDC discovery: http://localhost:8080/.well-known/openid-configuration
  # First start runs `start-from-init`: initialises the DB schema + creates the admin user.
  # See docs/05-runbooks/auth-bootstrap.md for the full bootstrap procedure.
  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.68.0
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY}" --tlsMode disabled
    restart: unless-stopped
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel_db
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${ZITADEL_DB_NAME:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${ZITADEL_DB_USER:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${ZITADEL_DB_USER:-zitadel}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"       # dev: no HTTPS; Caddy handles TLS in prod
      ZITADEL_EXTERNALPORT: "8080"
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNALDOMAIN:-localhost}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_USERNAME:-admin}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD}
    depends_on:
      zitadel_db:
        condition: service_healthy
    ports:
      # Loopback only in dev — Zitadel admin console and OIDC endpoints at localhost:8080.
      - "127.0.0.1:8080:8080"

volumes:
  db_data:
  meili_data:
  zitadel_db_data: