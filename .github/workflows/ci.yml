name: CI

# Quality gate for the integration (dev) and production (master) branches, and every PR
# targeting them. No deploy (CD is deferred — ADR-0027).
on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — full history so the diff-lint step (below) can compute the
      # merge-base with origin/dev for the changed-files gate (#591).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Node is needed to run Jest: jest@30's NodeEnvironment does not initialize under Bun's
      # runtime, so the API test step below invokes jest with Node, not `bun run`.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      # Persist Turborepo's local cache across runs so `turbo build` is warm on a hit and only
      # rebuilds the workspaces whose inputs changed. Keyed on the source/lockfile hash with a
      # restore-key prefix so a partial (older) cache still seeds a faster rebuild. Turbo verifies
      # task inputs itself, so a stale entry is never reused incorrectly — at worst it rebuilds.
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('bun.lock', 'apps/**', 'packages/**', 'turbo.json') }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # @lazyit/shared must be built before the apps typecheck/build (they import its dist).
      - name: Build shared package
        run: bun run --filter @lazyit/shared build

      # The generated Prisma client is imported by API code AND its specs — generate before
      # typecheck/test or compilation fails (ADR-0027).
      - name: Generate Prisma client
        working-directory: apps/api
        run: bunx prisma generate

      # Each workspace is typechecked with the config that defines its shipped contract:
      # shared via tsconfig.build.json (the one `bun run build` compiles); the apps via their
      # project tsconfig. (shared's base tsconfig.json adds editor-only strictness not enforced
      # by the build — see the report's note on noUncheckedIndexedAccess.)
      - name: Typecheck
        run: |
          bunx tsc --noEmit -p packages/shared/tsconfig.build.json
          bunx tsc --noEmit -p apps/api/tsconfig.json
          bunx tsc --noEmit -p apps/web/tsconfig.json

      # Full-repo lint is REPORT-ONLY (`eslint .`, no --fix) — same as the repo's `lint` script;
      # `lint:fix` is the separate mutating fixer (#353). Both need the generated Prisma client,
      # produced by the "Generate Prisma client" step above. Non-blocking: the codebase is not
      # yet eslint-clean (pre-existing prettier/type-lint findings), so this is a visible report
      # of the legacy backlog. The diff-lint step below is the BLOCKING gate for NEW code (#591).
      # Promote this to blocking once the backlog is clean (drop continue-on-error).
      - name: Lint API (report-only)
        working-directory: apps/api
        continue-on-error: true
        run: bunx eslint .

      - name: Lint Web (report-only)
        working-directory: apps/web
        continue-on-error: true
        run: bunx eslint .

      # BLOCKING diff-lint gate (#591): lint ONLY the files changed vs the merge-base with
      # origin/dev, so a NEW violation in changed code fails CI while the legacy backlog stays
      # exempt (the report-only steps above keep it visible). No custom ratchet — the diff IS
      # the ratchet. eslint runs per app in its own dir with that app's flat config, exactly as
      # the report-only steps do; --no-error-on-unmatched-pattern absorbs paths the config
      # ignores (generated/dist/cjs) so they don't fail the gate.
      - name: Lint changed files (blocking)
        run: |
          set -euo pipefail
          git fetch --no-tags --quiet origin dev
          base="$(git merge-base origin/dev HEAD)"
          echo "Diffing changed files against merge-base $base"
          changed="$(git diff --name-only --diff-filter=d "$base" HEAD \
            | grep -E '\.(ts|tsx|js|jsx|mjs|cjs)$' || true)"
          if [ -z "$changed" ]; then
            echo "No changed lintable files — nothing to gate."
            exit 0
          fi
          api_files="$(echo "$changed" | sed -n 's#^apps/api/##p' || true)"
          web_files="$(echo "$changed" | sed -n 's#^apps/web/##p' || true)"
          status=0
          if [ -n "$api_files" ]; then
            echo "::group::eslint apps/api (changed)"
            (cd apps/api && echo "$api_files" | xargs bunx eslint --no-error-on-unmatched-pattern) || status=1
            echo "::endgroup::"
          fi
          if [ -n "$web_files" ]; then
            echo "::group::eslint apps/web (changed)"
            (cd apps/web && echo "$web_files" | xargs bunx eslint --no-error-on-unmatched-pattern) || status=1
            echo "::endgroup::"
          fi
          exit $status

      # API unit tests mock the Prisma client → no database needed (ADR-0027). Run under Node
      # (jest@30 fails to init under Bun's runtime); see the Set up Node step above.
      - name: Test API
        working-directory: apps/api
        run: node node_modules/.bin/jest

      - name: Test shared
        working-directory: packages/shared
        run: bun test

      # Web unit tests cover the framework-agnostic list-state helpers (#217 — the pure URL-patch
      # core of useListParams). No DOM/router: `bun test` runs them directly, like the shared step.
      - name: Test web
        working-directory: apps/web
        run: bun test

      # --cache-dir=.turbo makes turbo read/write the cache at the path persisted by actions/cache
      # above (its default is node_modules/.cache/turbo, which isn't cached). Still builds all three
      # workspaces; on a cache hit unchanged ones are replayed instead of recompiled.
      - name: Build all workspaces
        run: bunx turbo build --cache-dir=.turbo

      # Verify the Help/Manual en↔es parity invariant (ADR-0062 §4 / CLAUDE.md rule #7).
      # Exits 1 when any slug exists in one locale tree but lacks a counterpart in the other.
      # No DB or generated client needed — pure filesystem check. Resolves #589.
      - name: Manual en↔es parity check
        working-directory: apps/web
        run: bun run check:manual-parity

  # The three images are built in PARALLEL (one matrix job per image, each on its own runner)
  # instead of sequentially in one job — docker wall-clock drops from the SUM of the three builds
  # to the MAX. This job is NOT gated on `verify` (no `needs:`): the image build and the quality
  # gate run concurrently, so the slow Docker stage no longer waits out the verify job.
  #   Trade-off: a run still spends Docker-build minutes even when `verify` fails. Accepted —
  #   fast feedback wins, the two failure modes are independent (a broken Dockerfile is worth
  #   surfacing immediately regardless of typecheck/test), and `cancel-in-progress` (above) kills
  #   superseded runs anyway. (ADR-0052.)
  docker:
    name: Build ${{ matrix.image }} image (no push)
    runs-on: ubuntu-latest
    strategy:
      # Build every image even if one fails, so all three Dockerfiles are validated per run.
      fail-fast: false
      matrix:
        image: [api, web, migrate]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Per-image GHA cache scope keeps each image's layer cache isolated (unchanged from before).
      - name: Build ${{ matrix.image }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/${{ matrix.image }}.Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          load: true
          tags: lazyit-${{ matrix.image }}:ci

      # Report-only Trivy scan — HIGH+CRITICAL findings are surfaced but do not block the build.
      # exit-code "0" keeps the step non-blocking while the baseline is being established.
      # To promote to blocking: change exit-code to "1" and drop the comment. Resolves #590.
      - name: Trivy vulnerability scan (${{ matrix.image }})
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: lazyit-${{ matrix.image }}:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"
          vuln-type: os,library
