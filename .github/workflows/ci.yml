name: CI

# Quality gate for every PR and every push to master. No deploy (CD is deferred — ADR-0027).
on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Node is needed to run Jest: jest@30's NodeEnvironment does not initialize under Bun's
      # runtime, so the API test step below invokes jest with Node, not `bun run`.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # @lazyit/shared must be built before the apps typecheck/build (they import its dist).
      - name: Build shared package
        run: bun run --filter @lazyit/shared build

      # The generated Prisma client is imported by API code AND its specs — generate before
      # typecheck/test or compilation fails (ADR-0027).
      - name: Generate Prisma client
        working-directory: apps/api
        run: bunx prisma generate

      # Each workspace is typechecked with the config that defines its shipped contract:
      # shared via tsconfig.build.json (the one `bun run build` compiles); the apps via their
      # project tsconfig. (shared's base tsconfig.json adds editor-only strictness not enforced
      # by the build — see the report's note on noUncheckedIndexedAccess.)
      - name: Typecheck
        run: |
          bunx tsc --noEmit -p packages/shared/tsconfig.build.json
          bunx tsc --noEmit -p apps/api/tsconfig.json
          bunx tsc --noEmit -p apps/web/tsconfig.json

      # Lint WITHOUT --fix: CI must report, never rewrite (the repo's lint script uses --fix).
      # Non-blocking for now: the codebase is not yet eslint-clean without --fix (pre-existing
      # prettier/type-lint findings). Promote to blocking once it is clean (drop continue-on-error).
      - name: Lint API
        working-directory: apps/api
        continue-on-error: true
        run: bunx eslint .

      - name: Lint Web
        working-directory: apps/web
        continue-on-error: true
        run: bunx eslint .

      # API unit tests mock the Prisma client → no database needed (ADR-0027). Run under Node
      # (jest@30 fails to init under Bun's runtime); see the Set up Node step above.
      - name: Test API
        working-directory: apps/api
        run: node node_modules/.bin/jest

      - name: Test shared
        working-directory: packages/shared
        run: bun test

      - name: Build all workspaces
        run: bunx turbo build

  docker:
    name: Build Docker images (no push)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/migrate.Dockerfile
          push: false
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,mode=max,scope=migrate
