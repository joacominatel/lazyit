sonar.projectKey=lazyit
sonar.projectName=lazyit

# Monorepo sources
sonar.sources=apps/api/src,apps/web/src,packages/shared/src
sonar.tests=apps/api/src,apps/api/test
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/test/**/*.ts

# TypeScript — one tsconfig per subfolder to avoid OOM on large analysis
sonar.typescript.tsconfigPaths=apps/api/tsconfig.json,apps/web/tsconfig.json,packages/shared/tsconfig.json

# Coverage (lcov generated by Jest before sonar-scanner runs)
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/.turbo/**,\
  **/generated/**,\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/test/**,\
  **/coverage/**,\
  **/.next/**

sonar.coverage.exclusions=\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/test/**,\
  **/node_modules/**

sonar.sourceEncoding=UTF-8
