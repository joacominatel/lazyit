# lazyit — DEV override (auto-merged by `docker compose up`). See docs/01-architecture/
# auth-zitadel-sot.md §9 and docs/04-development/setup.md.
#
# Plain `docker compose up` (from the repo ROOT) auto-loads compose.yaml + THIS file and brings up
# ONLY the unprofiled backing services — db, meilisearch, valkey, zitadel, zitadel_db — for native
# `bun run dev` (api/web run on the host at :3000/:3001, NOT in containers). The prod-only services
# (api, web, migrate, caddy, backup) carry `profiles: [prod]` in compose.yaml, so they stay down
# here. This file is COMMITTED and never gitignored — it is the canonical dev experience.
#
# What it tunes vs. the canonical compose.yaml (which carries the prod hardening):
#   - publishes each backing service on 127.0.0.1 (loopback only, never the LAN — SEC-005/ADR-0028)
#     so the host-native api/web can reach them: Postgres 5432, Meili 7700, Valkey 6379, Zitadel 8080;
#   - flips Zitadel to the dev form: --tlsMode disabled + EXTERNALSECURE=false + EXTERNALPORT 8080
#     (no Caddy in front of dev — the apps hit http://localhost:8080 directly);
#   - relaxes prod-only ergonomics for local work: restart policy back to "no", and drops the
#     mem_limit/cpus ceilings (a laptop shouldn't be capped). Volumes/healthchecks are inherited.
#   - adds a DEV `zitadel-secrets-init-dev` (a distinct name from the prod profiles:[prod] one) so
#     plain `docker compose up` no longer crash-loops Zitadel on a fresh `zitadel_secrets` volume
#     (#477). It chmods the secrets dir 0777 BEFORE Zitadel starts, so Zitadel's non-root uid can
#     write bootstrap-key.json (otherwise the 03_default_instance migration fatals + the container
#     restart-loops). See compose.yaml's prod zitadel-secrets-init for the full rationale.

services:
  db:
    # Dev convenience: don't keep restarting a backing service on a laptop.
    restart: "no"
    # Loopback only — the dev DB must not be reachable from the LAN (SEC-005, ADR-0028).
    # localhost connections are unaffected; production never publishes this port at all.
    ports:
      - "127.0.0.1:5432:5432"
    # Drop the prod resource ceiling for local development.
    mem_limit: 0
    cpus: 0

  meilisearch:
    restart: "no"
    # Loopback only — the dev search engine must not be reachable from the LAN (SEC-005, ADR-0028).
    ports:
      - "127.0.0.1:7700:7700"
    mem_limit: 0
    cpus: 0

  valkey:
    restart: "no"
    # Loopback only — the dev BullMQ broker must not be reachable from the LAN (SEC-005, ADR-0028).
    ports:
      - "127.0.0.1:6379:6379"
    mem_limit: 0
    cpus: 0

  zitadel_db:
    restart: "no"
    mem_limit: 0
    cpus: 0

  # --- Zitadel secrets-volume permission fixer — DEV equivalent of the prod one (#477) -----
  # A freshly-created `zitadel_secrets` volume is owned root:root (mode 0755), but the `zitadel`
  # container runs as a NON-ROOT uid (~1000). Without this, Zitadel can't write its FirstInstance
  # machine key (bootstrap-key.json) and the 03_default_instance migration fatals → crash-loop. This
  # one-shot init runs as root and chmods the dir 0777 BEFORE Zitadel starts, so plain
  # `docker compose up` works with no manual chmod (and scripts/dev-setup.ts no longer needs it).
  # The prod zitadel-secrets-init in compose.yaml is profiles:[prod]; this is its UNPROFILED dev
  # twin (an unprofiled service may not depend_on a profiled one). 0777 on an internal-only named
  # volume on a single dev host is an accepted tradeoff (mirrors the prod rationale; ADR-0028).
  # A SEPARATE service name (not "zitadel-secrets-init") on purpose: Compose merges list fields like
  # `profiles` by UNION across files, so re-declaring the prod service here could never drop its
  # `profiles: [prod]` (an empty list can't subtract). A distinct, unprofiled name sidesteps the merge
  # entirely and stays active in the plain `docker compose up` dev run.
  zitadel-secrets-init-dev:
    # alpine:3.21 — pinned by digest (matches the prod zitadel-secrets-init in compose.yaml).
    image: alpine:3.21@sha256:48b0309ca019d89d40f670aa1bc06e426dc0931948452e8491e3d65087abc07d
    user: "0:0"
    restart: "no"
    command: ["sh", "-c", "chmod 0777 /zitadel-secrets"]
    volumes:
      - zitadel_secrets:/zitadel-secrets
    networks: [internal]

  zitadel:
    # Dev: no HTTPS — Zitadel serves plain HTTP on loopback :8080; Caddy only exists in prod.
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY}" --tlsMode disabled
    restart: unless-stopped
    environment:
      ZITADEL_EXTERNALSECURE: "false"       # dev: no HTTPS; Caddy handles TLS in prod
      ZITADEL_EXTERNALPORT: "8080"
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNALDOMAIN:-localhost}
    ports:
      # Loopback only in dev — Zitadel admin console and OIDC endpoints at localhost:8080.
      # Admin console:  http://localhost:8080/ui/console
      # OIDC discovery: http://localhost:8080/.well-known/openid-configuration
      - "127.0.0.1:8080:8080"
    # Gate Zitadel on the dev secrets-init COMPLETING (chmod 0777 the volume) so the non-root uid can
    # write bootstrap-key.json on first boot — fixes the #477 crash-loop at the compose level. This
    # edge is valid here because BOTH services are unprofiled in the dev merge (the prod merge adds
    # the equivalent edge in infra/docker-compose.prod.yaml instead — see compose.yaml's note).
    # NOTE: this MERGES with the base zitadel's `depends_on: { zitadel_db: service_healthy }` (Compose
    # unions depends_on maps by key), so dev Zitadel waits for BOTH zitadel_db AND this init.
    depends_on:
      zitadel-secrets-init-dev:
        condition: service_completed_successfully
    mem_limit: 0
    cpus: 0
